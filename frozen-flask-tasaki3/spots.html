                <div class="container mgt50">

                    <div class="row">
                        <div class="col-md-7">
                            <h4>大濠公園</h4>
                            <p>
                                福岡市中央区にある大きな池を中心とした公園。
                                散歩やランニングコースとして人気があり、自然を感じながら
                                ゆったり過ごすことができます。
                            </p>
                        </div>
                        <div class="col-md-5">
                            <img src="images/images_spots/ohorikouen.jpg" alt="大濠公園1" width="100%">

                    </div>

                    <div class="row mgt50">
                        <div class="col-md-5">

                        </div>
                        <div class="col-md-7">
                            <h4>福岡タワー</h4>
                            <p>
                                高さ234mの海浜タワーで、展望台からは福岡市内や博多湾を
                                一望できます。夜はライトアップされ、夜景スポットとしても人気です。
                            </p>
                        </div>
                    </div>

                    <div class="row mgt50">
                        <div class="col-md-7">

                                多くの人で賑わいます。
                            </p>

                            <!-- {{ image('spot/kushidajinjya.jpg', '櫛田神社1', 'spot-img') }} -->


                        </div>
                    </div>
