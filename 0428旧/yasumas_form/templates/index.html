<!-- templates/index.html -->
{% extends "base.html" %}

{% set title = "福岡の旅ガイド" %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/index.css') }}">
{% endblock %}

{% block content %}

<!-- ヒーロー -->
<section class="hero">
    <img src="{{ url_for('static', filename='images/top.jpg') }}">
    <div class="overlay"></div>

    <div class="hero-center">
        <h1>行ってみたい！会ってみたい！</h1>
        <p>福岡の旅ガイド</p>
    </div>
</section>

<!-- カテゴリ -->
<section class="section">
    <div class="grid-menu">

        <a href="{{ url_for('spots') }}" class="grid-item">
            <div class="grid-icon">🏝</div>
            <p>観る</p>
        </a>

        <a href="{{ url_for('foods') }}" class="grid-item">
            <div class="grid-icon">🍜</div>
            <p>食べる</p>
        </a>

        <a href="{{ url_for('course') }}" class="grid-item">
            <div class="grid-icon">💑</div>
            <p>デート</p>
        </a>

        <a href="#" class="grid-item">
            <div class="grid-icon">🛍</div>
            <p>買う</p>
        </a>

        <a href="#" class="grid-item">
            <div class="grid-icon">♨️</div>
            <p>温泉</p>
        </a>

        <a href="{{ url_for('access') }}" class="grid-item">
            <div class="grid-icon">🚃</div>
            <p>アクセス</p>
        </a>

    </div>
</section>

<!-- 特集（カードスライダー風） -->
<section class="section">
    <h2 class="section-title">特集</h2>

    <div class="card">
        <img src="{{ url_for('static', filename='images/feature1.jpg') }}">
        <h3>福岡おすすめデート</h3>
        <p>20代カップル向けの1日プラン</p>
    </div>

    <div class="card">
        <img src="{{ url_for('static', filename='images/feature2.jpg') }}">
        <h3>絶品グルメ特集</h3>
        <p>博多ラーメン・もつ鍋など</p>
    </div>

</section>

<!-- フッターナビ -->
<nav class="bottom-nav">
    <a href="{{ url_for('index') }}">🏠<span>TOP</span></a>
    <a href="{{ url_for('spots') }}">📍<span>観光</span></a>
    <a href="{{ url_for('foods') }}">🍜<span>グルメ</span></a>
    <a href="{{ url_for('access') }}">🚃<span>アクセス</span></a>
</nav>

{% endblock %}
