<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Weather Test</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='weather_nav'.css') }}">
</head>

<body>

    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>

            <!-- OpenWeather画像版 -->
            <li class="weather-box">
                <a href="https://weathernews.jp/onebox/tenki/fukuoka/"
                target="_blank"
                rel="noopener noreferrer">
                <img
                    src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png"
                    alt="福岡の天気"
                    width="50"
                >
                <p>{{ weather.temp }}℃</p>
            </li>

        </ul>
    </nav>



</body>
</html>
