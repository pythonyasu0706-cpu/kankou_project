<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    <!-- favicon -->
    <link rel="icon" href="../static/icon/fav_ramen.svg">
    <!-- Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Noto+Sans+JP:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="static/css/weather.css">

    <!-- 共通 main.css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/weather.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/weather_nav.css') }}">
    <!-- フォントアイコン フッター用CSS component.cssとは別に -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- ページ専用CSS置き場 -->
    {% block page_css %}{% endblock %}
    <!-- Bootstrap CSS -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->

    <!-- 全体共通reset.css
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
    全体共通CSS
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    コンポーネント用CSS
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    お問い合わせフォーム用CSS
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/contact.css')}}">
    デートコース用CSS
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/course.css')}}">
    アクセスページ用CSS
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/access.css')}}">
    foods.html + spots.html用
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}"> -->
</head>

<body>
    <!-- ハンバーガーメニューは前頁共通 -->
    {% include "partials/hamburger.html" %}
    <!-- TOPページはヘッダーが不要のため -->
    {% if show_header is not defined or show_header %}
        {% include "partials/page_header.html" %}
    {% endif %}


    <main>
        {% block content %}{% endblock %}
    </main>

    {% include "partials/footer.html" %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JS（最後に） -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/weather.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>

</html>
