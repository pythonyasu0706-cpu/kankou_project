<!-- templates/index.html -->
{% extends "base.html" %}

<!-- TOPページは画像が大きく出るためヘッダー不要 -->
{% set show_header = false %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/top.css') }}">
{% endblock %}

{% block content %}

<div class="hero">
    <!-- 背景 -->
    <div class="slider">
        <img src="{{ url_for('static', filename='images/top/fukuoka.jpg')}}", alt='福岡の風景', class='active'>
        <img src="{{ url_for('static', filename='images/top/momochihama.jpg')}}">
        <img src="{{ url_for('static', filename='images/top/nakasu.jpg')}}">
        <img src="{{ url_for('static', filename='images/top/maizuru_park.jpg')}}">
        <img src="{{ url_for('static', filename='images/top/dontaku.jpg')}}">
    </div>

    <!-- ★ タイトルここ ★ -->
    <div class="title">
        <img src="{{ url_for('static', filename='images/top/title-edit.png')}}">
    </div>

    <!-- 波 -->
    <div class="wave wave-back">
        <div class="wave-inner">
            <svg viewBox="0 0 1440 120">
                <path
                    d="M0,60 C180,120 360,0 540,60 C720,120 900,0 1080,60 C1260,120 1440,0 1440,60 L1440,120 L0,120 Z"
                    fill="#4fd1c5" />
            </svg>
            <svg viewBox="0 0 1440 120">
                <path
                    d="M0,60 C180,120 360,0 540,60 C720,120 900,0 1080,60 C1260,120 1440,0 1440,60 L1440,120 L0,120 Z"
                    fill="#4fd1c5" />
            </svg>
        </div>
    </div>

    <div class="wave wave-front">
        <div class="wave-inner">
            <svg viewBox="0 0 1440 120">
                <path
                    d="M0,60 C180,120 360,0 540,60 C720,120 900,0 1080,60 C1260,120 1440,0 1440,60 L1440,120 L0,120 Z"
                    fill="#0ABAB5" />
            </svg>
            <svg viewBox="0 0 1440 120">
                <path
                    d="M0,60 C180,120 360,0 540,60 C720,120 900,0 1080,60 C1260,120 1440,0 1440,60 L1440,120 L0,120 Z"
                    fill="#0ABAB5" />
            </svg>
        </div>
    </div>

    <!-- 飛行機 -->
    <div class="plane">
        <div class="trail"></div>
        <img src="{{ url_for('static', filename='icon/airplane_top.svg')}}">
    </div>

</div>

<!-- 特集（カードスライダー風） -->
<section class="section">
    <h2 class="section-title">特集</h2>

    <div class="card">
        <img src="{{ url_for('static', filename='images/feature1.jpg') }}">
        <h3>福岡おすすめデート</h3>
        <p>20代カップル向けの1日プラン</p>
    </div>

    <div class="card">
        <img src="{{ url_for('static', filename='images/feature2.jpg') }}">
        <h3>絶品グルメ特集</h3>
        <p>博多ラーメン・もつ鍋など</p>
    </div>

</section>

{% block page_js %}
<script src="{{ url_for('static', filename='js/top.js') }}"></script>
{% endblock %}

<!-- フッターナビ -->
<nav class="bottom-nav">
    <a href="{{ url_for('index') }}">🏠<span>TOP</span></a>
    <a href="{{ url_for('spots') }}">📍<span>観光</span></a>
    <a href="{{ url_for('foods') }}">🍜<span>グルメ</span></a>
    <a href="{{ url_for('access') }}">🚃<span>アクセス</span></a>
</nav>

{% endblock %}
