<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理画面｜問い合わせ一覧</title>

    <style>
        body { font-family: sans-serif; margin: 30px; background: #f5f5f5; }
        h1 { margin-bottom: 20px; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            vertical-align: top;
        }

        th {
            background: #333;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .btn-delete {
            background: red;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-delete:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<h1>問い合わせ一覧</h1>

<table>
    <tr>
        <th>日時</th>
        <th>名前</th>
        <th>件名</th>
        <th>メール</th>
        <th>内容</th>
        <th>操作</th>
    </tr>

    {% for c in contacts %}
    <tr>
        <td>{{ c.created_at }}</td>
        <td>{{ c.name }}</td>
        <td>{{ c.subject }}</td>
        <td>{{ c.email }}</td>
        <td>{{ c.message }}</td>

        <td>
            <form action="/delete/{{ c.id }}" method="POST" onsubmit="return confirm('削除しますか？');">
                <button class="btn-delete">削除</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
