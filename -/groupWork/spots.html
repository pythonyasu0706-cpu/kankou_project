<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>（旅館芳野の模写）福岡市の観光スポット</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- タイトル -->
    <section class="main-img">
        <h3>福岡市の観光スポット</h3>
    </section>

    <!-- メイン -->
    <section class="add-bg-history">
        <div class="container-fluid">
            <div class="txt-center">
                <h3>福岡観光ガイド<span>Fukuoka Travel Guide</span></h3>
            </div>

            <div class="mgb50">
                <img src="images/fukuoka_main.jpg" width="100%">
                <p class="fs80 txt-right">福岡市の街並みと博多湾の風景</p>
            </div>
        </div>

        <div class="container">

            <!-- 大濠公園 -->
            <div class="row">
                <div class="col-md-7">
                    <h4>大濠公園</h4>
                    <p>
                        福岡市中央区にある大きな池を中心とした公園。
                        散歩やランニングコースとして人気があり、自然を感じながら
                        ゆったり過ごすことができます。
                    </p>
                </div>
                <div class="col-md-5">
                    <img src="images/ohori.jpg" width="100%">
                </div>
            </div>

            <!-- 福岡タワー -->
            <div class="row mgt50">
                <div class="col-md-5">
                    <img src="images/fukuoka_tower.jpg" width="100%">
                </div>
                <div class="col-md-7">
                    <h4>福岡タワー</h4>
                    <p>
                        高さ234mの海浜タワーで、展望台からは福岡市内や博多湾を
                        一望できます。夜はライトアップされ、夜景スポットとしても人気です。
                    </p>
                </div>
            </div>

            <!-- 太宰府天満宮 -->
            <div class="row mgt50">
                <div class="col-md-7">
                    <h4>太宰府天満宮</h4>
                    <p>
                        学問の神様・菅原道真を祀る神社。
                        受験シーズンには多くの参拝客が訪れ、
                        周辺では名物の梅ヶ枝餅も楽しめます。
                    </p>
                </div>
                <div class="col-md-5">
                    <img src="images/dazaifu.jpg" width="100%">
                </div>
            </div>

        </div>
    </section>

    <!-- ギャラリー -->
    <section>
        <div class="container">
            <div class="row mgt50">
                <div class="col-md-3"><img src="images/fukuoka1.jpg" width="100%"></div>
                <div class="col-md-3"><img src="images/fukuoka2.jpg" width="100%"></div>
                <div class="col-md-3"><img src="images/fukuoka3.jpg" width="100%"></div>
                <div class="col-md-3"><img src="images/fukuoka4.jpg" width="100%"></div>
            </div>
        </div>
    </section>

    <!-- JS -->
    <script src="js/jquery-1.11.3.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

</body>

</html>
